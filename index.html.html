<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Flores Amarillas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #1a1208;
      font-family: 'Jost', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #3d2a00 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 100% 100%, #2a1a00 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 0% 50%, #1f1500 0%, transparent 60%);
      z-index: 0; pointer-events: none;
    }

    #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .card {
      position: relative; z-index: 2;
      width: 100%; max-width: 520px;
      background: linear-gradient(160deg, #fdf8ef 0%, #fef5e4 40%, #fdf0d8 100%);
      border-radius: 4px; overflow: hidden;
      box-shadow: 0 0 0 1px rgba(180,140,60,0.3), 0 40px 100px rgba(0,0,0,0.6), 0 8px 30px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, #d4a820, #f0c840, #d4a820, transparent);
    }

    .top-ornament {
      text-align: center; padding: 1.8rem 0 0;
      opacity: 0; animation: fadeDown .8s ease .2s forwards;
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }

    .main-area {
      display: flex; align-items: flex-start;
      padding: 1rem 2rem 0; min-height: 280px;
    }

    .left-col { flex: 1; padding-top: 1.5rem; padding-right: 1rem; }

    .label-small {
      font-family: 'Jost', sans-serif;
      font-size: .6rem; font-weight: 300;
      letter-spacing: .22em; text-transform: uppercase;
      color: #b89040; margin-bottom: .6rem;
      opacity: 0; animation: fadeUp .8s ease .5s forwards;
    }

    .dedication-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 300; font-style: italic;
      color: #3d2800; line-height: 1.5; margin-bottom: 1.2rem;
      opacity: 0; animation: fadeUp .9s ease .7s forwards;
    }

    .dedication-msg {
      font-family: 'Jost', sans-serif;
      font-size: .78rem; font-weight: 200;
      color: #6b4a20; line-height: 1.85;
      white-space: pre-line;
      opacity: 0; animation: fadeUp .9s ease 1.1s forwards;
    }

    #treeCanvas { flex-shrink: 0; width: 210px; height: 280px; display: block; }

    .divider {
      display: flex; align-items: center; gap: .8rem;
      padding: 1rem 2rem;
      opacity: 0; animation: fadeIn .8s ease 2s forwards;
    }
    .div-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #d4b070, transparent); }
    .div-icon { font-size: .7rem; color: #d4a820; letter-spacing: .1em; }

    .counter-section {
      padding: 0 2rem 1.8rem;
      opacity: 0; animation: fadeUp .8s ease 2.2s forwards;
    }

    .since-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: .9rem; font-style: italic;
      color: #a07840; text-align: center; margin-bottom: .8rem;
    }

    .counter-grid { display: flex; justify-content: center; }

    .counter-item { text-align: center; padding: .6rem 1.2rem; position: relative; }
    .counter-item + .counter-item::before {
      content: ''; position: absolute; left: 0; top: 50%;
      transform: translateY(-50%); width: 1px; height: 60%; background: #d4b07060;
    }

    .counter-item .num {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 600;
      color: #c08010; line-height: 1; letter-spacing: -.02em;
    }
    .counter-item .lbl {
      display: block;
      font-family: 'Jost', sans-serif;
      font-size: .55rem; font-weight: 300;
      letter-spacing: .18em; text-transform: uppercase;
      color: #a07840; margin-top: .2rem;
    }

    .brand {
      text-align: center;
      font-family: 'Jost', sans-serif;
      font-size: .55rem; font-weight: 200;
      letter-spacing: .25em; text-transform: uppercase;
      color: #c8a06070; padding-bottom: 1.5rem;
      opacity: 0; animation: fadeIn 1s ease 3s forwards;
    }

    .card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #d4a82050, #f0c84070, #d4a82050, transparent);
    }

    .cfg-toggle {
      width: 100%; background: rgba(212,168,32,0.06);
      border: none; border-top: 1px solid rgba(212,168,32,0.15);
      padding: .8rem;
      font-family: 'Jost', sans-serif;
      font-size: .6rem; font-weight: 300;
      letter-spacing: .2em; text-transform: uppercase;
      color: #a07840; cursor: pointer; transition: background .2s;
    }
    .cfg-toggle:hover { background: rgba(212,168,32,0.12); }

    .cfg-panel { display: none; padding: 1.2rem 1.5rem 1.5rem; background: rgba(212,168,32,0.04); border-top: 1px solid rgba(212,168,32,0.1); }
    .cfg-panel.open { display: block; }

    .cfg-panel label { display: block; font-size: .6rem; font-weight: 300; letter-spacing: .15em; text-transform: uppercase; color: #a07840; margin-bottom: 4px; }
    .cfg-panel input, .cfg-panel textarea { width: 100%; padding: 7px 10px; border: 1px solid rgba(212,168,32,0.2); border-radius: 3px; background: rgba(253,248,239,0.9); color: #3d2800; font-size: .78rem; font-family: 'Jost', sans-serif; font-weight: 300; margin-bottom: 10px; outline: none; transition: border-color .2s; }
    .cfg-panel input:focus, .cfg-panel textarea:focus { border-color: #d4a820; }
    .cfg-panel textarea { resize: vertical; min-height: 70px; }
    .cfg-row { display: flex; gap: 10px; }
    .cfg-row > div { flex: 1; }

    .btn-apply { background: linear-gradient(135deg, #c89818, #e0b020); color: #1a1208; border: none; border-radius: 3px; padding: 9px 24px; font-size: .65rem; font-family: 'Jost', sans-serif; font-weight: 400; letter-spacing: .2em; text-transform: uppercase; cursor: pointer; transition: opacity .2s; }
    .btn-apply:hover { opacity: .85; }

    @media (max-width: 480px) {
      .main-area { padding: 1rem 1.2rem 0; }
      #treeCanvas { width: 165px; height: 230px; }
      .counter-item { padding: .5rem .7rem; }
      .counter-item .num { font-size: 1.9rem; }
      .counter-section, .divider { padding-left: 1.2rem; padding-right: 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="card">
  <div class="top-ornament">
    <svg width="120" height="16" viewBox="0 0 120 16">
      <line x1="0" y1="8" x2="48" y2="8" stroke="#d4a820" stroke-width=".5" opacity=".5"/>
      <polygon points="56,2 60,8 56,14 52,8" fill="none" stroke="#d4a820" stroke-width=".8" opacity=".8"/>
      <circle cx="60" cy="8" r="1.5" fill="#d4a820" opacity=".9"/>
      <polygon points="64,2 68,8 64,14 60,8" fill="none" stroke="#d4a820" stroke-width=".8" opacity=".5"/>
      <line x1="72" y1="8" x2="120" y2="8" stroke="#d4a820" stroke-width=".5" opacity=".5"/>
    </svg>
  </div>

  <div class="main-area">
    <div class="left-col">
      <div class="label-small" id="labelSmall">para el amor de mi vida</div>
      <div class="dedication-title" id="dedTitle">Veronica Ailen Challen<br>para vos</div>
      <div class="dedication-msg" id="dedMsg">Si pudiera elegir un lugar en el mundo para estar, siempre te elegiría a ti. TE AMO INFINITAMENTE.</div>
    </div>
    <canvas id="treeCanvas" width="210" height="280"></canvas>
  </div>

  <div class="divider">
    <div class="div-line"></div>
    <div class="div-icon">✦ ✦ ✦</div>
    <div class="div-line"></div>
  </div>

  <div class="counter-section">
    <div class="since-label">Mi amor por ti comenzó hace...</div>
    <div class="counter-grid">
      <div class="counter-item"><span class="num" id="dDays">0</span><span class="lbl">días</span></div>
      <div class="counter-item"><span class="num" id="dHours">0</span><span class="lbl">horas</span></div>
      <div class="counter-item"><span class="num" id="dMins">0</span><span class="lbl">minutos</span></div>
      <div class="counter-item"><span class="num" id="dSecs">0</span><span class="lbl">segundos</span></div>
    </div>
  </div>

  <div class="brand">✦ &nbsp; creado con amor &nbsp; ✦</div>

  <button class="cfg-toggle" onclick="toggleCfg()">✦ &nbsp; personalizar &nbsp; ✦</button>
  <div class="cfg-panel" id="cfgPanel">
    <div class="cfg-row">
      <div><label>Subtítulo</label><input id="cLabel" value="para el amor de mi vida"/></div>
      <div><label>Fecha inicio (AAAA-MM-DD)</label><input id="cDate" value="2024-10-26"/></div>
    </div>
    <label>Título principal</label>
    <input id="cTitle" value="Flores Amarillas para vos"/>
    <label>Mensaje</label>
    <textarea id="cMsg">Si pudiera elegir un lugar en el mundo para estar, siempre te elegiría a ti.</textarea>
    <button class="btn-apply" onclick="applyConfig()">Actualizar</button>
  </div>
</div>

<script>
/* ── FONDO ── */
(function(){
  const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
  let pts=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight;pts=[];for(let i=0;i<60;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:.3+Math.random()*1.1,t:Math.random()*Math.PI*2,sp:.003+Math.random()*.005});}
  function draw(){ctx.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.t+=p.sp;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(212,168,32,${.04+.1*Math.abs(Math.sin(p.t))})`;ctx.fill();});requestAnimationFrame(draw);}
  window.addEventListener('resize',resize);resize();draw();
})();

/* ── ÁRBOL ── */
const canvas=document.getElementById('treeCanvas');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height,CX=W/2;

function heartFlowers(cx,cy,scale,count){
  const arr=[];
  for(let i=0;i<count;i++){
    const t=(i/count)*Math.PI*2;
    const hx=16*Math.pow(Math.sin(t),3);
    const hy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    arr.push({x:cx+hx*scale+(Math.random()-.5)*3.5,y:cy+hy*scale+(Math.random()-.5)*3.5,r:4+Math.random()*5,angle:Math.random()*Math.PI*2});
  }
  return arr;
}

function drawSunflower(x,y,r,alpha,angle){
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.rotate(angle);
  const cols=['#f5c518','#e8b000','#f7d200','#fad126','#f0bb00','#fce030'];
  for(let p=0;p<14;p++){
    const a=(p/14)*Math.PI*2;
    ctx.save();ctx.rotate(a);
    ctx.fillStyle=cols[p%cols.length];
    ctx.beginPath();ctx.ellipse(0,-r*.9,r*.33,r*.55,0,0,Math.PI*2);
    ctx.fill();ctx.restore();
  }
  const grd=ctx.createRadialGradient(0,0,0,0,0,r*.48);
  grd.addColorStop(0,'#2a1000');grd.addColorStop(1,'#4a2800');
  ctx.beginPath();ctx.arc(0,0,r*.48,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  ctx.fillStyle='#1a0800';
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2,d=r*.22;ctx.beginPath();ctx.arc(Math.cos(a)*d,Math.sin(a)*d,r*.06,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawTrunk(cx,baseY){
  ctx.save();
  ctx.beginPath();ctx.moveTo(cx-11,baseY);ctx.lineTo(cx+10,baseY);ctx.lineTo(cx+6,baseY-72);ctx.lineTo(cx-6,baseY-72);ctx.closePath();
  const tg=ctx.createLinearGradient(cx-11,0,cx+10,0);tg.addColorStop(0,'#5a3010');tg.addColorStop(.5,'#8a5828');tg.addColorStop(1,'#6a4018');
  ctx.fillStyle=tg;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=.5;
  for(let i=0;i<4;i++){const lx=cx-8+i*5;ctx.beginPath();ctx.moveTo(lx,baseY-5);ctx.lineTo(lx+2,baseY-68);ctx.stroke();}
  ctx.restore();
}

const falling=[];
function spawnPetal(flowers){
  if(Math.random()>.3)return;
  const f=flowers[Math.floor(Math.random()*flowers.length)];
  falling.push({x:f.x,y:f.y,vx:(Math.random()-.5)*1.1,vy:.5+Math.random()*1.4,r:f.r*.4,alpha:.8,rot:Math.random()*Math.PI,vrot:.02+Math.random()*.04});
}
function drawPetal(p){
  ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);
  ctx.fillStyle='#f7d200';ctx.beginPath();ctx.ellipse(0,0,p.r*.4,p.r*.75,0,0,Math.PI*2);ctx.fill();ctx.restore();
}

const flowers=heartFlowers(CX,112,6.5,115);
let revealed=0;

function animate(){
  ctx.clearRect(0,0,W,H);
  drawTrunk(CX,H-4);
  const n=Math.min(Math.floor(revealed),flowers.length);
  for(let i=0;i<n;i++){const f=flowers[i];drawSunflower(f.x,f.y,f.r,Math.min(1,(n-i)/14),f.angle);}
  if(revealed<flowers.length)revealed+=1.2;
  if(revealed>=flowers.length)spawnPetal(flowers);
  for(let i=falling.length-1;i>=0;i--){
    const p=falling[i];p.y+=p.vy;p.x+=p.vx+Math.sin(p.rot*.5)*.4;p.rot+=p.vrot;p.alpha-=.005;
    if(p.alpha<=0||p.y>H){falling.splice(i,1);continue;}
    drawPetal(p);
  }
  requestAnimationFrame(animate);
}
animate();

/* ── CONTADOR ── */
let startDate=new Date('2024-03-21T00:00:00');
function tick(){
  const diff=Date.now()-startDate;if(diff<0)return;
  const s=Math.floor(diff/1000);
  document.getElementById('dDays').textContent=Math.floor(s/86400);
  document.getElementById('dHours').textContent=Math.floor((s%86400)/3600);
  document.getElementById('dMins').textContent=Math.floor((s%3600)/60);
  document.getElementById('dSecs').textContent=s%60;
}
setInterval(tick,1000);tick();

/* ── CONFIG ── */
function toggleCfg(){document.getElementById('cfgPanel').classList.toggle('open');}
function applyConfig(){
  document.getElementById('labelSmall').textContent=document.getElementById('cLabel').value;
  document.getElementById('dedTitle').innerHTML=document.getElementById('cTitle').value.replace(/\n/g,'<br>');
  document.getElementById('dedMsg').textContent=document.getElementById('cMsg').value;
  const d=new Date(document.getElementById('cDate').value+'T00:00:00');
  if(!isNaN(d)){startDate=d;tick();}
  revealed=0;
}
</script>
</body>
</html>
